syntax = "proto3";
package cloisim.msgs;
option java_package = "com.cloisim.msgs";
option java_outer_classname = "MicomProtos";

/// \ingroup cloisim_msgs
/// \interface Micom
/// \brief Message for Micom Board

import "time.proto";
import "battery.proto";
import "pose.proto";
import "vector3d.proto";
import "sonar.proto";
import "contacts.proto";
import "twist.proto";

message Micom
{
  message Odometry
  {
    message Wheel
    {
      double left   = 1;
      double right  = 2;
    }

    Wheel angular_velocity = 1;
    Wheel linear_velocity  = 2;
    Vector3d pose          = 3;
    Twist twist            = 4;
  }

  message USS
  {
    double distance  = 1;
    Sonar state      = 2;
  }

  message IR
  {
    double distance  = 1;
    Sonar state      = 2;
  }

  message Magnet
  {
    bool detected = 1;
  }

  message Bumper
  {
    bool bumped       = 1;
    Contacts contacts = 2;
  }

  Time time               = 1;
  Odometry odom           = 2;
  repeated USS uss        = 3;
  repeated IR ir          = 4;
  repeated Magnet magnet  = 5;
  repeated Bumper bumper  = 6;
  Battery battery         = 7;
  Pose pose               = 8;
}