syntax = "proto3";
package cloisim.msgs;
option java_package = "com.cloisim.msgs";
option java_outer_classname = "PerceptionVProtos";

/// \ingroup cloisim_msgs
/// \interface perception_V
/// \brief Message for perception

import "header.proto";
import "perception.proto";

message Perception_V
{
  Header header = 1;
  repeated Perception perception = 2;
}
