syntax = "proto3";
package cloisim.msgs;
option java_package = "com.cloisim.msgs";
option java_outer_classname = "ImagesProtos";

/// \ingroup cloisim_msgs
/// \interface Images
/// \brief Message for a multiple image with a time

import "time.proto";
import "image.proto";

message Images
{
  // Time when all the images were captured
  Time time          = 1;
  repeated Image image        = 2;
}
