syntax = "proto3";
package cloisim.msgs;
option java_package = "com.cloisim.msgs";
option java_outer_classname = "PerceptionProtos";

/// \ingroup cloisim_msgs
/// \interface Perception
/// \brief Message for perception

import "header.proto";
import "vector3d.proto";

message Perception
{
  Header header = 1;
  int32 tracking_id = 2;
  int32 class_id = 3;
  Vector3d position = 4;
  Vector3d velocity = 5;
  Vector3d size = 6;
  repeated Vector3d footprint = 7;
}