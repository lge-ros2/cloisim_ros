syntax = "proto3";
package cloisim.msgs;
option java_package = "com.cloisim.msgs";
option java_outer_classname = "JointStateProtos";

/// \ingroup cloisim_msgs
/// \interface JointState
/// \brief Message for joint state

message JointState
{
  string name = 1;
  double position = 2;
  double velocity = 3;
  double effort = 4;
}
