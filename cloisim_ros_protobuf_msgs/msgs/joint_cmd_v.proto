syntax = "proto3";
package cloisim.msgs;
option java_package = "com.cloisim.msgs";
option java_outer_classname = "JointCmdVProtos";

/// \ingroup cloisim_msgs
/// \interface JointCmd_V
/// \brief Message for joint command, used by cloisim_ros_joint_control

import "time.proto";
import "joint_cmd.proto";

message JointCmd_V
{
  Time time          = 1;
  repeated JointCmd joint_cmd  = 2;
}
